<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ryuzy's Portfolio</title>
    <meta name="author" content="Ryuzy">
    <meta name="description" content="세계에서 짱먹는 개발자">
    <link rel="icon" type="image/png" href="./images/flower-removebg.png">
    <script src="https://kit.fontawesome.com/133260cff9.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar 시작 -->
    <nav id="navbar">
        <div class="navbar__logo">
            <i class="fa-solid fa-tree"></i>
            <a href="#">Ryuzy</a>
        </div>
        <ul class="navbar__menu">

        </ul>
        <!-- 버튼 시작 -->
        <button class="navbar__toggle-btn">
            <i class="fa-solid fa-bars"></i>
        </button>
        <!-- 버튼 끝 -->
    </nav>
    <!-- Navbar 끝 -->
    <!-- 홈 시작 -->
    <section id="home">
        <div class="home__container">
            <img src="./images/Ryuzy.png" alt="Ryuzy's photo" class="home__avatar">
            <h1 class="home__title">안녕하세요. 저는 류지입니다!</h1>
            <h2 class="home__description">서울 양재동에 거주하고 있구요, 세계에서 짱 먹는 개발자가 될 예정입니다!</h2>
            <button class="home__contact">연락주세요!</button>
